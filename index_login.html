<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL BARRILETE - Ingreso</title>
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="main.js" defer></script>
</head>
<body>
    <header id="cabezera" class="cabezera">
        <a href="index.html" class="nombre">
            <span class="icono1"></span>
            <h1>EL BARRILETE</h1>
        </a>
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
            <span class="hamburger"></span>
        </button>
        <nav class="nav-botones" id="nav-botones">
            <a href="index_registro.html" class="iniciar-sesion public-nav">
                <h2>REGISTRARSE</h2>
            </a>
            <a href="index.html" class="volver-inicio">
                <h2>VOLVER AL INICIO</h2>
            </a>
        </nav>
    </header>

    <main class="container login-page">
        <section class="login-section">
            <div class="login-card">
                <h2>INICIAR SESIÓN</h2>
                <p class="login-subtitle">Ingresa tus datos para acceder al catálogo</p>
                <div id="error-box" class="error-box hidden"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Usuario o Correo Electrónico</label>
                        <input type="text" id="login-email" placeholder="Ingresa tu usuario o correo" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" placeholder="Ingresa tu contraseña" required>
                    </div>
                    <button type="submit" class="btn-primary-link">
                        <h2>INGRESAR</h2>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <span class="creditos">Basante Andres, Belalcazar Naomy, Cortes Kevyn, Escobar Cristiam, Gonzales Juan</span>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL BARRILETE - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="main.js" defer></script>
</head>
<body>
    <header id="cabezera" class="cabezera">
        <a href="index.html" class="nombre">
            <span class="icono1"></span>
            <h1>EL BARRILETE</h1>
        </a>
        
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
            <span class="hamburger"></span>
        </button>

        <nav class="nav-botones" id="nav-botones">
            <a href="index_login.html" class="iniciar-sesion public-nav">
                <h2>INICIAR SESIÓN</h2>
            </a>
            <a href="index.html" class="volver-inicio public-nav">
                <h2>VOLVER AL INICIO</h2>
            </a>
        </nav>
    </header>

    <main class="register-page">
        <section class="register-section">
            <div class="register-card">
                <h2>CREAR CUENTA</h2>
                <p class="register-subtitle">Regístrate para disfrutar de nuestro catálogo exclusivo</p>
                
                <div id="error-box" class="error-box hidden"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-name">Nombre Completo</label>
                        <input type="text" id="reg-name" placeholder="Tu nombre y apellido" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-confirm">Confirmar Contraseña</label>
                        <input type="password" id="reg-confirm" placeholder="Repite tu contraseña" required>
                    </div>

                    <button type="submit" class="btn-primary-link">
                        <h2>REGISTRARSE</h2>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <span class="creditos">Basante Andres, Belalcazar Naomy, Cortes Kevyn, Escobar Cristiam, Gonzales Juan</span>
    </footer>
</body>
</html>
